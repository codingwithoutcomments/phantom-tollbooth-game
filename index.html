function drawChar(ch, x, y, scale, color) {
  const data = FONT_CHARS[ch.toUpperCase()];
  if (!data) return;
  ctx.fillStyle = color;
  for (let col = 0; col < 5; col++) {
    for (let row = 0; row < 7; row++) {
      if (data[col] & (1 << row)) {
        ctx.fillRect(x + col * scale, y + row * scale, scale, scale);
      }
    }
  }
}

function drawText(text, x, y, scale, color, align) {
  const charW = 6 * scale;
  const totalW = text.length * charW;
  let startX = x;
  if (align === 'center') startX = x - totalW / 2;
  else if (align === 'right') startX = x - totalW;
  for (let i = 0; i < text.length; i++) {
    drawChar(text[i], startX + i * charW, y, scale, color);
  }
}

// Word-wrap text and draw multiple lines
function drawTextWrapped(text, x, y, scale, color, maxWidth, lineHeight) {
  const charW = 6 * scale;
  const maxChars = Math.floor(maxWidth / charW);
  const words = text.split(' ');
  let line = '';
  let lineY = y;

  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (test.length > maxChars && line) {
      drawText(line, x, lineY, scale, color, 'center');
      lineY += lineHeight;
      line = word;
    } else {
      line = test;
    }
  }
  if (line) {
    drawText(line, x, lineY, scale, color, 'center');
    lineY += lineHeight;
  }
  return lineY;
}

function drawPixelArt(data, x, y, pixelSize) {
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      if (data[row][col]) {
        ctx.fillStyle = data[row][col];
        ctx.fillRect(x + col * pixelSize, y + row * pixelSize, pixelSize, pixelSize);
      }
    }
  }
}

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// Unlock audio on first user interaction (required for mobile)
function unlockAudio() {
  getAudio();
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('touchend', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('touchend', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

function playTone(freq, duration, type = 'square', volume = 0.1) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function getTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) / (rect.width / W),
    y: (touch.clientY - rect.top) / (rect.height / H),
  };
}

  for (const touch of e.touches) {
    const pos = getTouchPos(touch);
    for (const [name, btn] of Object.entries(vButtons)) {
      if (pos.x >= btn.x && pos.x <= btn.x + btn.w &&
          pos.y >= btn.y && pos.y <= btn.y + btn.h) {
        touchState[name] = true;
      }
    }
  }
  // Map touch to keys for staircase physics
  keys['ArrowLeft'] = touchState.left;
  keys['ArrowRight'] = touchState.right;
  if (touchState.jump && !keys['touchJumpPrev']) {
    keys[' '] = true;
  } else if (!touchState.jump) {
    keys[' '] = false;
  }
  keys['touchJumpPrev'] = touchState.jump;
}

canvas.addEventListener('touchstart', updateTouchState, { passive: false });
canvas.addEventListener('touchmove', updateTouchState, { passive: false });
canvas.addEventListener('touchend', (e) => {
  if (gameState !== 'staircase' || staircaseState.phase !== 'playing') return;
  e.preventDefault();
  touchState.left = false;
  touchState.right = false;
  touchState.jump = false;
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  keys[' '] = false;
  keys['touchJumpPrev'] = false;
}, { passive: false });

function drawVirtualButtons() {
  if (!isMobile) return;
  for (const [name, btn] of Object.entries(vButtons)) {
    const pressed = touchState[name];
    ctx.fillStyle = pressed ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.15)';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
    drawText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2 - 4, name === 'jump' ? 1 : 2,
      pressed ? '#ffffff' : '#cccccc', 'center');
  }
}

window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  keys[e.code] = true;
  handleInput(e.key, e.code);
});
window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
  keys[e.code] = false;
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  clickX = (e.clientX - rect.left) / (rect.width / W);
  clickY = (e.clientY - rect.top) / (rect.height / H);
  clicked = true;
  handleClick(clickX, clickY);
});

function handleInput(key, code) {
  if (gameState === 'title') {
    if (key === 'Enter' || key === ' ') {
      sfxConfirm();
      transitionTo('summary');
    }
  } else if (gameState === 'summary') {
    if (key === 'Enter' || key === ' ') {
      sfxConfirm();
      transitionTo('charselect');
    }
  } else if (gameState === 'charselect') {
    if (key === 'ArrowLeft' || key === 'a') {
      selectedCharacter = (selectedCharacter + 2) % 3;
      sfxMove();
    } else if (key === 'ArrowRight' || key === 'd') {
      selectedCharacter = (selectedCharacter + 1) % 3;
      sfxMove();
    } else if (key === 'Enter' || key === ' ') {
      sfxConfirm();
      startDriving();
    }
  } else if (gameState === 'doldrums') {
    if (key === ' ' || key === 'Enter') {
      doldrumsThink();
    }
  }
}

function handleClick(x, y) {
  if (gameState === 'title') {
    sfxConfirm();
    transitionTo('summary');
  } else if (gameState === 'summary') {
    sfxConfirm();
    transitionTo('charselect');
  } else if (gameState === 'charselect') {
    // Check if clicking on a character
    const charSpacing = 140;
    const startX = W / 2 - charSpacing;
    for (let i = 0; i < 3; i++) {
      const cx = startX + i * charSpacing;
      if (x > cx - 50 && x < cx + 50 && y > 100 && y < 240) {
        if (selectedCharacter === i) {
          sfxConfirm();
          startDriving();
        } else {
          selectedCharacter = i;
          sfxMove();
        }
        return;
      }
    }
  } else if (gameState === 'doldrums') {
    // Check if clicking on a Lethargarian
    const LETH_QUOTES = [
      'I WAS BUSY DOING NOTHING...',
      'SHHH... IM NAPPING',
      'DONT BOTHER ME...',
      'I FORGOT WHAT I WAS DOING',
      'MAYBE TOMORROW... OR NEVER',
      'THINKING IS AGAINST THE LAW!',
      'WHY DO ANYTHING AT ALL?',
      'I HAD A PLAN ONCE... NAH',
      'TOO TIRED TO BE TIRED',
      'IS IT BEDTIME YET?',
      'GO AWAY... IM DOING NOTHING',
      'YAWN...',
      'WHO NEEDS ADVENTURES?',
      'EFFORT IS OVERRATED',
      'I USED TO CARE... BUT I FORGOT',
    ];
    let clickedLeth = false;
    for (const leth of lethargarians) {
      const dx = x - leth.x;
      const dy = y - leth.y;
      if (Math.abs(dx) < leth.size * 2 && Math.abs(dy) < leth.size * 2) {
        leth.speech = LETH_QUOTES[Math.floor(Math.random() * LETH_QUOTES.length)];
        leth.speechTimer = 100;
        playTone(120, 0.1, 'sine', 0.04);
        clickedLeth = true;
        break;
      }
    }
    if (!clickedLeth) {
      doldrumsThink();
    }
  }
}

// ============================================================
// TRANSITIONS
// ============================================================
function transitionTo(state) {
  transitionTarget = state;
  transitionAlpha = 0;
}

function startDriving() {
  transitionTarget = 'driving';
  transitionAlpha = 0;
  driveTimer = 0;
  drivePhase = 0;
  carX = -40;
  signX = W + 100;
}

function startDoldrums() {
  gameState = 'doldrums';
  doldrumsEnergy = 0;
  doldrumsWon = false;
  doldrumsTimer = 0;
  doldrumsMessage = 'YOU ENTER THE DOLDRUMS...';
  doldrumsGrayness = 1.0;
  doldrumsClicks = [];
  // Create lethargarians
  lethargarians = [];
  for (let i = 0; i < 5; i++) {
    lethargarians.push({
      x: 60 + Math.random() * (W - 120),
      y: 140 + Math.random() * 120,
      frame: Math.random() * Math.PI * 2,
      size: 8 + Math.random() * 4,
      speech: '',
      speechTimer: 0,
    });
  }
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawStars() {
  for (const star of stars) {
    const b = Math.sin(frameCount * 0.02 + star.brightness * 10) * 0.3 + 0.7;
    const c = Math.floor(b * 180 + 40);
    ctx.fillStyle = `rgb(${c},${c},${c})`;
    ctx.fillRect(Math.floor(star.x), Math.floor(star.y), 2, 2);
    star.y -= star.speed;
    if (star.y < 0) { star.y = H; star.x = Math.random() * W; }
  }
}

function drawRoad(scrollOffset) {
  // Sky
  ctx.fillStyle = '#2040a0';
  ctx.fillRect(0, 0, W, 200);
  // Ground
  ctx.fillStyle = '#3a7a3a';
  ctx.fillRect(0, 200, W, 120);
  // Road
  ctx.fillStyle = '#505050';
  ctx.fillRect(0, 220, W, 70);
  // Road lines (dashed)
  ctx.fillStyle = '#f0c040';
  const dashLen = 30;
  const gapLen = 20;
  const offset = (scrollOffset || 0) % (dashLen + gapLen);
  for (let x = -offset; x < W; x += dashLen + gapLen) {
    ctx.fillRect(x, 253, dashLen, 4);
  }
  // Road edges
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(0, 218, W, 3);
  ctx.fillRect(0, 289, W, 3);
}

function drawCar(x, y, bounce) {
  const by = Math.sin(bounce) * 2;
  drawPixelArt(CAR_SPRITE, x, y + by, 3);
}

function drawCharacterLarge(key, x, y) {
  const sprite = SPRITES[key];
  drawPixelArt(sprite.data, x - 24, y - 24, 3);
}

// ============================================================
// SCREEN RENDERERS
// ============================================================

// Title screen animation state
let titleAnimTimer = 0;
// Phases: 0=car approaches, 1=barrier lifts, 2=car drives through, 3=barrier closes, 4=loop pause
const TITLE_PHASE_TIMES = [90, 40, 70, 40, 60]; // frames per phase

function getTitlePhase() {
  let t = titleAnimTimer % (TITLE_PHASE_TIMES.reduce((a,b) => a+b, 0));
  for (let i = 0; i < TITLE_PHASE_TIMES.length; i++) {
    if (t < TITLE_PHASE_TIMES[i]) return { phase: i, progress: t / TITLE_PHASE_TIMES[i] };
    t -= TITLE_PHASE_TIMES[i];
  }
  return { phase: 4, progress: 1 };
}

function renderTitle() {
  titleAnimTimer++;
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  const { phase, progress } = getTitlePhase();

  // -- Draw the tollbooth scene --
  const boothX = W / 2;
  const groundY = 105;

  // Road surface
  ctx.fillStyle = '#383838';
  ctx.fillRect(boothX - 100, groundY, 200, 12);
  ctx.fillStyle = '#f0c040';
  // Dashed center line
  for (let i = -100; i < 100; i += 18) {
    ctx.fillRect(boothX + i, groundY + 5, 10, 2);
  }

  // Tollbooth structure - booth cabin
  ctx.fillStyle = '#705030';
  ctx.fillRect(boothX - 4, groundY - 48, 32, 48); // main cabin
  ctx.fillStyle = '#8a6840';
  ctx.fillRect(boothX - 2, groundY - 46, 28, 44); // cabin face
  // Roof
  ctx.fillStyle = '#c03030';
  ctx.fillRect(boothX - 8, groundY - 54, 40, 8);
  ctx.fillStyle = '#a02020';
  ctx.fillRect(boothX - 6, groundY - 56, 36, 4);
  // Window
  ctx.fillStyle = '#80c0e0';
  ctx.fillRect(boothX + 4, groundY - 40, 16, 12);
  // Window shine
  ctx.fillStyle = '#b0e0ff';
  ctx.fillRect(boothX + 5, groundY - 39, 4, 4);
  // Sign on booth
  drawText('TOLL', boothX + 12, groundY - 22, 1, COLORS.yellow, 'center');

  // Left post (barrier pivot post)
  ctx.fillStyle = '#606060';
  ctx.fillRect(boothX - 10, groundY - 30, 6, 30);
  // Post base
  ctx.fillStyle = '#505050';
  ctx.fillRect(boothX - 12, groundY - 4, 10, 4);

  // Barrier arm - angle depends on phase
  let barrierAngle;
  if (phase === 0) {
    barrierAngle = 0; // down/horizontal
  } else if (phase === 1) {
    // lifting
    barrierAngle = -progress * (Math.PI / 2.2);
  } else if (phase === 2) {
    barrierAngle = -(Math.PI / 2.2); // fully up
  } else if (phase === 3) {
    // closing
    barrierAngle = -(1 - progress) * (Math.PI / 2.2);
  } else {
    barrierAngle = 0; // down
  }

  const armLen = 70;
  const armPivotX = boothX - 7;
  const armPivotY = groundY - 26;
  const armEndX = armPivotX - Math.cos(barrierAngle) * armLen;
  const armEndY = armPivotY + Math.sin(barrierAngle) * armLen;

  // Draw barrier arm (red and white stripes)
  for (let i = 0; i < armLen; i++) {
    const t = i / armLen;
    const px = armPivotX + (armEndX - armPivotX) * t;
    const py = armPivotY + (armEndY - armPivotY) * t;
    ctx.fillStyle = (Math.floor(i / 8) % 2 === 0) ? '#c03030' : '#e0e0e0';
    ctx.fillRect(px - 1, py - 2, 3, 5);
  }
  // Pivot circle
  ctx.fillStyle = '#f0c040';
  ctx.fillRect(armPivotX - 3, armPivotY - 3, 6, 6);

  // Little red car - position depends on phase
  let titleCarX;
  if (phase === 0) {
    // approaching from left, stops before barrier
    titleCarX = boothX - 140 + progress * 60;
  } else if (phase === 1) {
    // waiting
    titleCarX = boothX - 80;
  } else if (phase === 2) {
    // driving through and off to the right
    titleCarX = boothX - 80 + progress * 220;
  } else if (phase === 3 || phase === 4) {
    // off screen right, then reappear far left at end
    titleCarX = phase === 4 ? boothX - 140 - (1 - progress) * 40 : boothX + 200;
  }

  // Only draw car if on screen
  if (titleCarX > -50 && titleCarX < W + 50) {
    const bounce = Math.sin(titleAnimTimer * 0.15) * 1;
    // Car body (smaller scale for title)
    drawPixelArt(CAR_SPRITE, titleCarX, groundY - 18 + bounce, 2);
    // Tiny character on car
    const key = characterKeys[0]; // always show Milo on title
    // Draw a tiny simplified Milo
    ctx.fillStyle = '#4080d0';
    ctx.fillRect(titleCarX + 12, groundY - 28 + bounce, 6, 8);
    ctx.fillStyle = '#f0b888';
    ctx.fillRect(titleCarX + 13, groundY - 33 + bounce, 4, 5);
    ctx.fillStyle = '#4a3020';
    ctx.fillRect(titleCarX + 13, groundY - 36 + bounce, 4, 3);
  }

  // -- Title text --
  drawText('THE PHANTOM', W/2, 140, 3, COLORS.yellow, 'center');
  drawText('TOLLBOOTH', W/2, 170, 3, COLORS.gold, 'center');
  drawText('GAME', W/2, 205, 2, COLORS.orange, 'center');

  // Blinking prompt
  if (Math.floor(frameCount / 30) % 2 === 0) {
    drawText('PRESS ENTER OR CLICK TO START', W/2, 260, 1, COLORS.white, 'center');
  }

  // Credits
  drawText('MADE BY NOA REATH', W/2, 292, 1, '#f0a0c0', 'center');
  drawText('BASED ON THE BOOK BY NORTON JUSTER', W/2, 306, 1, COLORS.gray, 'center');
}

function renderSummary() {
  ctx.fillStyle = COLORS.darkBg;
  ctx.fillRect(0, 0, W, H);

  drawText('THE PHANTOM TOLLBOOTH', W/2, 15, 2, COLORS.yellow, 'center');

  // Decorative line
  ctx.fillStyle = COLORS.gold;
  ctx.fillRect(W/2 - 100, 38, 200, 2);

  const summary = 'THE PHANTOM TOLLBOOTH BY NORTON JUSTER IS A CLASSIC FANTASY NOVEL ABOUT MILO, A BORED YOUNG BOY WHO FEELS UNINTERESTED IN EVERYTHING. AFTER DISCOVERING A MAGICAL TOLLBOOTH IN HIS ROOM, HE TRAVELS TO THE KINGDOM OF WISDOM. AT FIRST, MILO DOES NOT HAVE A GOAL FOR HIS JOURNEY, BUT HE IS PRESSURED TO RESCUE THE PRINCESSES RHYME AND REASON, WHICH BECOMES HIS GOAL. ALONG THE WAY, HE CHANGES INTO A CURIOUS AND IMAGINATIVE PERSON. THE MAIN ANTAGONIST IS THE IDEA OF IGNORANCE, SHOWN THROUGH CREATURES THAT TRY TO STOP HIM. THE STORY TEACHES THE IMPORTANCE OF CURIOSITY AND LEARNING, AND IT HAS CREATIVE CHARACTERS LIKE THE SPELLING BEE AND THE ORCHESTRA OF COLOR.';

  drawTextWrapped(summary, W/2, 52, 1, COLORS.white, W - 40, 14);

  // Blinking prompt
  if (Math.floor(frameCount / 30) % 2 === 0) {
    drawText('PRESS ENTER OR CLICK TO CONTINUE', W/2, 296, 1, COLORS.cyan, 'center');
  }
}

function renderCharSelect() {
  ctx.fillStyle = COLORS.darkBg;
  ctx.fillRect(0, 0, W, H);

  drawText('CHOOSE YOUR AVATAR', W/2, 30, 2, COLORS.yellow, 'center');

  const charSpacing = 140;
  const startX = W / 2 - charSpacing;

  for (let i = 0; i < 3; i++) {
    const key = characterKeys[i];
    const sprite = SPRITES[key];
    const cx = startX + i * charSpacing;
    const isSelected = i === selectedCharacter;

    // Selection box
    if (isSelected) {
      const pulse = Math.sin(frameCount * 0.08) * 5;
      ctx.strokeStyle = COLORS.yellow;
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - 45 - pulse/2, 70 - pulse/2, 90 + pulse, 140 + pulse);
      // Arrow
      drawText('V', cx, 60, 1, COLORS.yellow, 'center');
    }

    // Character sprite (large)
    drawCharacterLarge(key, cx, 120);

    // Name
    drawText(sprite.name, cx, 180, 2, isSelected ? COLORS.white : COLORS.gray, 'center');
    drawText(sprite.desc, cx, 200, 1, isSelected ? COLORS.cyan : COLORS.darkGray, 'center');
  }

  drawText('< ARROW KEYS OR CLICK TO SELECT >', W/2, 240, 1, COLORS.lightGray, 'center');

  if (Math.floor(frameCount / 30) % 2 === 0) {
    drawText('PRESS ENTER TO BEGIN YOUR JOURNEY', W/2, 270, 1, COLORS.green, 'center');
  }

  // Show selected character's car preview
  drawCar(W/2 - 24, 285, frameCount * 0.1);
}

function renderDriving() {
  driveTimer++;
  const scrollSpeed = 3;
  const scrollOffset = driveTimer * scrollSpeed;

  drawRoad(scrollOffset);

  // Sky details - clouds
  ctx.fillStyle = '#ffffff30';
  for (let i = 0; i < 3; i++) {
    const cx = ((i * 200 + 50) - scrollOffset * 0.3 + 2000) % (W + 100) - 50;
    ctx.fillRect(cx, 40 + i * 30, 60, 12);
    ctx.fillRect(cx + 10, 30 + i * 30, 40, 10);
  }

  // Hills in background
  ctx.fillStyle = '#2a6a2a';
  for (let x = 0; x < W; x++) {
    const h = Math.sin((x + scrollOffset * 0.2) * 0.02) * 20 + Math.sin((x + scrollOffset * 0.2) * 0.005) * 30;
    ctx.fillRect(x, 190 - h, 1, 10 + h);
  }

  if (drivePhase === 0) {
    // Car driving across
    carX = Math.min(carX + 2, W / 2 - 24);
    drawCar(carX, 232, driveTimer * 0.15);
    sfxDrive();

    // Draw character on car
    const key = characterKeys[selectedCharacter];
    const sprite = SPRITES[key];
    const by = Math.sin(driveTimer * 0.15) * 2;
    drawPixelArt(sprite.data, carX + 10, 208 + by, 2);

    if (driveTimer > 90) {
      drivePhase = 1;
    }
  } else if (drivePhase === 1) {
    // Sign appears
    drawCar(W / 2 - 24, 232, driveTimer * 0.15);
    const key = characterKeys[selectedCharacter];
    const sprite = SPRITES[key];
    const by = Math.sin(driveTimer * 0.15) * 2;
    drawPixelArt(sprite.data, W / 2 - 24 + 10, 208 + by, 2);

    signX = Math.max(signX - 4, W / 2 - 80);

    // Big sign
    ctx.fillStyle = '#705030';
    ctx.fillRect(signX - 5, 40, 170, 90);
    ctx.fillStyle = '#f0d090';
    ctx.fillRect(signX, 45, 160, 80);
    // Sign posts
    ctx.fillStyle = '#705030';
    ctx.fillRect(signX + 30, 130, 8, 70);
    ctx.fillRect(signX + 120, 130, 8, 70);

    drawText('WELCOME TO', signX + 80, 55, 1, '#705030', 'center');
    drawText('THE LANDS', signX + 80, 72, 2, '#8B4513', 'center');
    drawText('BEYOND!', signX + 80, 95, 2, '#8B4513', 'center');

    if (signX <= W / 2 - 80 && driveTimer > 240) {
      drivePhase = 2;
      driveTimer = 0;
    }
  } else if (drivePhase === 2) {
    // Drive off screen toward doldrums
    carX = W / 2 - 24 + driveTimer * 3;
    drawCar(carX, 232, driveTimer * 0.15);
    const key = characterKeys[selectedCharacter];
    const sprite = SPRITES[key];
    const by = Math.sin(driveTimer * 0.15) * 2;
    drawPixelArt(sprite.data, carX + 10, 208 + by, 2);

    // Sign stays
    ctx.fillStyle = '#705030';
    ctx.fillRect(signX - 5, 40, 170, 90);
    ctx.fillStyle = '#f0d090';
    ctx.fillRect(signX, 45, 160, 80);
    ctx.fillStyle = '#705030';
    ctx.fillRect(signX + 30, 130, 8, 70);
    ctx.fillRect(signX + 120, 130, 8, 70);
    drawText('WELCOME TO', signX + 80, 55, 1, '#705030', 'center');
    drawText('THE LANDS', signX + 80, 72, 2, '#8B4513', 'center');
    drawText('BEYOND!', signX + 80, 95, 2, '#8B4513', 'center');

    if (carX > W + 60 && gameState !== 'doldrums') {
      startDoldrums();
    }
  }
}

function renderDoldrums() {
  doldrumsTimer++;

  // Background - starts very gray, gets more colorful as you think
  const gray = Math.max(0, 1 - doldrumsEnergy / doldrumsTarget);
  doldrumsGrayness += (gray - doldrumsGrayness) * 0.05;
  const g = doldrumsGrayness;

  // Lerp between gray and colorful
  const skyR = Math.floor(100 * g + 80 * (1-g));
  const skyG = Math.floor(100 * g + 140 * (1-g));
  const skyB = Math.floor(100 * g + 200 * (1-g));
  ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
  ctx.fillRect(0, 0, W, 200);

  const gndR = Math.floor(120 * g + 60 * (1-g));
  const gndG = Math.floor(120 * g + 140 * (1-g));
  const gndB = Math.floor(120 * g + 60 * (1-g));
  ctx.fillStyle = `rgb(${gndR},${gndG},${gndB})`;
  ctx.fillRect(0, 200, W, 120);

  // Energy drain (check win threshold before draining)
  if (!doldrumsWon) {
    if (doldrumsEnergy >= doldrumsTarget) {
      doldrumsWon = true;
      doldrumsMessage = 'YOU THOUGHT YOUR WAY OUT!';
      doldrumsWinTimer = 0;
      doldrumsTransitioned = false;
      sfxConfirm();
    } else {
      doldrumsEnergy = Math.max(0, doldrumsEnergy - doldrumsDrain);
    }
  }

  // Draw Lethargarians (lazy blob creatures)
  for (const leth of lethargarians) {
    leth.frame += 0.02;
    const wobble = Math.sin(leth.frame) * 3;
    const lethGray = Math.floor(140 * g + 100 * (1-g));
    ctx.fillStyle = `rgb(${lethGray},${lethGray + 10},${lethGray})`;
    // Body
    ctx.beginPath();
    ctx.ellipse(leth.x, leth.y + wobble, leth.size * 1.5, leth.size, 0, 0, Math.PI * 2);
    ctx.fill();
    // Sleepy eyes
    ctx.fillStyle = `rgb(${Math.floor(80*g + 40*(1-g))},${Math.floor(80*g + 40*(1-g))},${Math.floor(80*g + 40*(1-g))})`;
    ctx.fillRect(leth.x - 4, leth.y + wobble - 2, 3, 1);
    ctx.fillRect(leth.x + 2, leth.y + wobble - 2, 3, 1);
    // Zzz
    if (g > 0.3 && leth.speechTimer <= 0) {
      const zOff = Math.sin(leth.frame * 2) * 5;
      drawText('Z', leth.x + leth.size + 4, leth.y - leth.size + zOff - 10, 1,
        `rgba(${lethGray},${lethGray},${lethGray},${g})`, 'left');
    }
    // Speech bubble when clicked
    if (leth.speechTimer > 0) {
      leth.speechTimer--;
      const bubbleW = leth.speech.length * 6 + 16;
      const bubbleX = leth.x;
      const bubbleY = leth.y - leth.size - 22 + wobble;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bubbleX - bubbleW/2, bubbleY - 10, bubbleW, 18);
      ctx.strokeStyle = '#404040';
      ctx.lineWidth = 1;
      ctx.strokeRect(bubbleX - bubbleW/2, bubbleY - 10, bubbleW, 18);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bubbleX - 3, bubbleY + 8, 6, 5);
      drawText(leth.speech, bubbleX, bubbleY - 5, 1, '#404040', 'center');
    }
  }

  // Draw "THINK!" click effects
  for (let i = doldrumsClicks.length - 1; i >= 0; i--) {
    const click = doldrumsClicks[i];
    click.life--;
    click.y -= 1;
    const alpha = click.life / click.maxLife;
    const c = Math.floor(200 + 55 * (1 - alpha));
    drawText('THINK!', click.x, click.y, 1, `rgba(${c},${c},80,${alpha})`, 'center');
    if (click.life <= 0) doldrumsClicks.splice(i, 1);
  }

  // Draw character
  const key = characterKeys[selectedCharacter];
  const sprite = SPRITES[key];
  const charY = doldrumsWon ? 190 - Math.min(doldrumsTimer - (doldrumsWon ? doldrumsTimer : 0), 30) * 0 : 190;
  drawPixelArt(sprite.data, W/2 - 24, charY, 3);

  // Energy bar
  ctx.fillStyle = '#303030';
  ctx.fillRect(W/2 - 100, 20, 200, 16);
  const barColor = doldrumsEnergy > 70 ? COLORS.green : doldrumsEnergy > 30 ? COLORS.yellow : COLORS.red;
  ctx.fillStyle = barColor;
  ctx.fillRect(W/2 - 98, 22, (doldrumsEnergy / doldrumsTarget) * 196, 12);
  drawText('THINKING POWER', W/2, 10, 1, COLORS.white, 'center');

  // Message — slower intro so you can read it
  if (doldrumsTimer < 180) {
    doldrumsMessage = 'YOU ENTER THE DOLDRUMS...';
  } else if (doldrumsTimer < 360) {
    doldrumsMessage = 'THINKING IS NOT ALLOWED HERE!';
  } else if (!doldrumsWon) {
    doldrumsMessage = 'CLICK OR PRESS SPACE TO THINK!';
  }
  drawText(doldrumsMessage, W/2, 290, 1, COLORS.white, 'center');

  if (doldrumsTimer < 360) {
    drawText('THE LETHARGARIANS DO NOTHING...', W/2, 305, 1, COLORS.gray, 'center');
  }

  // Win state
  if (doldrumsWon) {
    doldrumsWinTimer++;
    // Dark banner behind win text for readability
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 130, W, 60);
    drawText('YOU THOUGHT YOUR WAY OUT!', W/2, 145, 3, COLORS.green, 'center');
    if (doldrumsWinTimer > 120 && !doldrumsTransitioned) {
      doldrumsTransitioned = true;
      transitionTo('driving2');
      driveTimer = 0;
      drivePhase = 0;
      carX = -40;
      signX = W + 100;
    }
  }
}

function doldrumsThink() {
  if (gameState !== 'doldrums' || doldrumsWon || doldrumsTimer < 360) return;
  doldrumsEnergy = Math.min(doldrumsTarget, doldrumsEnergy + 8);
  doldrumsClicks.push({
    x: W/2 - 30 + Math.random() * 60,
    y: 180,
    life: 30,
    maxLife: 30,
  });
  playTone(200 + doldrumsEnergy * 4, 0.05, 'sine', 0.08);
}

function startWordMarket() {
  wordMarketState = {
    round: 0,
    score: 0,

    currentPairs: shuffleArray([...WORD_PAIRS]).slice(0, 5),
    selected: -1,
    feedback: '',

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function wordMarketAnswer(choice) {
  const wm = wordMarketState;
  if (wm.done || wm.feedbackTimer > 0) return;
  const pair = wm.currentPairs[wm.round];
  if (choice === pair.answer) {
    wm.score++;
    wm.feedback = 'CORRECT!';
    sfxConfirm();
  } else {
    wm.feedback = 'NOT QUITE! IT WAS ' + pair.options[pair.answer];
    playTone(150, 0.2, 'square', 0.08);
  }
  wm.feedbackTimer = 60;
}

canvas.addEventListener('click', (e) => {
  if (gameState !== 'wordmarket') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / (rect.width / W);
  const my = (e.clientY - rect.top) / (rect.height / H);

  if (wordMarketState.done) {
    sfxConfirm();
    transitionTo('driving3');
    driveTimer = 0;
    drivePhase = 0;
    carX = -40;
    signX = W + 100;

  if (wordMarketState.feedbackTimer > 0) return;

  // Easter egg: click the Spelling Bee for a hint!
  const wm = wordMarketState;
  const beeY = 62 + Math.sin(frameCount * 0.05) * 8;
  if (mx > wm.spellingBeeX - 18 && mx < wm.spellingBeeX + 22 &&
      my > beeY - 12 && my < beeY + 18 && !wm.done) {
    const pair = wm.currentPairs[wm.round];
    const answer = pair.options[pair.answer];
    // Spell it out letter by letter with dashes
    wm.beeHint = answer.split('').join('-');
    wm.beeHintTimer = 120;
    playTone(600, 0.05, 'sine', 0.08);
    playTone(800, 0.05, 'sine', 0.06);
    return;
  }

  const optionY = 155;
  const optionSpacing = 45;
  for (let i = 0; i < 3; i++) {
    const y = optionY + i * optionSpacing;
    if (mx > W/2 - 120 && mx < W/2 + 120 && my > y - 5 && my < y + 25) {
      wordMarketAnswer(i);
      return;
    }
  }
});

  const dawnProgress = Math.min(1, driveTimer / 180);
  const skyR = Math.floor(15 + dawnProgress * 30);

  const skyB = Math.floor(50 + dawnProgress * 40);
  ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
  ctx.fillRect(0, 0, W, 200);

  // Stars fading as dawn approaches

    for (let i = 0; i < 20; i++) {
      const sx = (i * 73 + 20) % W;
      const sy = (i * 37 + 10) % 150;
      const alpha = (1 - dawnProgress) * (0.3 + Math.sin(frameCount * 0.03 + i) * 0.2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(sx, sy, 2, 2);
    }

  drawRoad(scrollOffset);

  ctx.fillStyle = '#1a4a1a';
  for (let x = 0; x < W; x++) {
    const h = Math.sin((x + scrollOffset * 0.2) * 0.02) * 20 + Math.sin((x + scrollOffset * 0.2) * 0.005) * 30;
    ctx.fillRect(x, 190 - h, 1, 10 + h);
  }

  if (drivePhase === 0) {
    // Car drives to center and stops

      transitionTo('orchestra');

const STRING_COLORS = [
  { name: 'RED', color: '#e04040', glow: '#ff6060', tone: 262 },
  { name: 'YELLOW', color: '#e0c040', glow: '#ffe060', tone: 330 },

];

let orchestraState = {};

function startOrchestra() {
  // Generate sequence of 10 strings to pluck
  const sequence = [];
  for (let i = 0; i < 10; i++) {
    sequence.push(Math.floor(Math.random() * 4));
  }
  orchestraState = {
    sequence: sequence,
    current: 0,
    total: 10,
    score: 0,
    phase: 'intro',       // intro, playing, done
    phaseTimer: 0,
    sunProgress: 0,
    activeString: -1,     // which string is lit up
    glowPulse: 0,         // animation pulse for the active string
    pluckedString: -1,    // which string was just plucked (for vibration anim)
    pluckTimer: 0,        // frames since last pluck (for vibration decay)
    wrongString: -1,      // flash red on wrong pluck
    wrongTimer: 0,
    skyStripes: [],       // color stripes painted in the sky
    done: false,
    doneTimer: 0,
  };
}

function renderOrchestra() {
  const os = orchestraState;
  os.phaseTimer++;
  os.glowPulse += 0.08;
  if (os.pluckTimer > 0) os.pluckTimer--;
  if (os.wrongTimer > 0) os.wrongTimer--;

  // Sky — starts dark, fills with color
  const sp = os.sunProgress;
  // Gradient from dark to sunrise colors
  const gradient = ctx.createLinearGradient(0, 0, 0, 180);
  gradient.addColorStop(0, `rgb(${Math.floor(15 + sp * 80)},${Math.floor(15 + sp * 60)},${Math.floor(50 + sp * 120)})`);
  gradient.addColorStop(1, `rgb(${Math.floor(20 + sp * 220)},${Math.floor(20 + sp * 130)},${Math.floor(40 + sp * 60)})`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, 180);

  // Sun rising
  if (sp > 0.15) {
    const sunY = 180 - sp * 140;
    const sunR = 12 + sp * 30;
    ctx.fillStyle = `rgba(255,200,50,${sp * 0.2})`;
    ctx.beginPath();
    ctx.arc(W / 2, sunY, sunR * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f0d040';
    ctx.beginPath();
    ctx.arc(W / 2, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Color stripes painted across the sky
  for (const stripe of os.skyStripes) {
    ctx.fillStyle = stripe.color + '50';
    ctx.fillRect(0, stripe.y, W, stripe.h);
  }

  // Ground
  ctx.fillStyle = `rgb(${Math.floor(25 + sp * 35)},${Math.floor(50 + sp * 70)},${Math.floor(25 + sp * 25)})`;
  ctx.fillRect(0, 180, W, 140);

  // Hills
  for (let x = 0; x < W; x++) {
    const h = Math.sin(x * 0.015) * 12 + Math.sin(x * 0.007) * 18;
    ctx.fillStyle = `rgb(${Math.floor(20 + sp * 25)},${Math.floor(45 + sp * 55)},${Math.floor(20 + sp * 18)})`;
    ctx.fillRect(x, 170 - h, 1, 10 + h);
  }

  // Chroma the Great on the left
  const chromaX = 38;
  const chromaY = 198;
  // Flowing robe (tapers at top, wider at bottom)
  ctx.fillStyle = '#6030a0';
  ctx.fillRect(chromaX - 12, chromaY + 24, 24, 8); // robe hem
  ctx.fillStyle = '#8040c0';
  ctx.fillRect(chromaX - 10, chromaY + 10, 20, 16); // lower robe
  ctx.fillStyle = '#9050d0';
  ctx.fillRect(chromaX - 8, chromaY, 16, 14); // upper robe
  // Colorful sash across chest
  ctx.fillStyle = '#e04040';
  ctx.fillRect(chromaX - 6, chromaY + 4, 12, 3);
  ctx.fillStyle = '#e0c040';
  ctx.fillRect(chromaX - 6, chromaY + 7, 12, 3);
  // Arms
  ctx.fillStyle = '#9050d0';
  ctx.fillRect(chromaX - 14, chromaY + 2, 5, 10); // left arm
  ctx.fillRect(chromaX + 9, chromaY + 2, 5, 10); // right arm (holds baton)
  // Hands
  ctx.fillStyle = '#f0b888';
  ctx.fillRect(chromaX - 14, chromaY + 10, 4, 4);
  ctx.fillRect(chromaX + 10, chromaY + 0, 4, 4);
  // Head
  ctx.fillStyle = '#f0b888';
  ctx.fillRect(chromaX - 5, chromaY - 12, 10, 12);
  // Eyes
  ctx.fillStyle = '#302020';
  ctx.fillRect(chromaX - 3, chromaY - 8, 2, 2);
  ctx.fillRect(chromaX + 2, chromaY - 8, 2, 2);
  // Smile
  ctx.fillRect(chromaX - 2, chromaY - 4, 4, 1);
  // Wild white hair
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(chromaX - 7, chromaY - 18, 14, 7);
  ctx.fillRect(chromaX - 8, chromaY - 16, 3, 6);
  ctx.fillRect(chromaX + 6, chromaY - 16, 3, 6);
  ctx.fillRect(chromaX - 5, chromaY - 20, 4, 3);
  ctx.fillRect(chromaX + 2, chromaY - 20, 4, 3);
  // Shoes
  ctx.fillStyle = '#302020';
  ctx.fillRect(chromaX - 10, chromaY + 32, 7, 3);
  ctx.fillRect(chromaX + 4, chromaY + 32, 7, 3);
  // Baton (waving)
  const batonWave = Math.sin(os.glowPulse * 2) * 0.4;
  ctx.fillStyle = '#f0f0f0';
  for (let i = 0; i < 22; i++) {
    const bx = chromaX + 14 + Math.cos(batonWave - 0.3) * i;
    const by = chromaY - 2 - Math.sin(batonWave - 0.3) * i;
    ctx.fillRect(bx, by, 2, 2);
  }
  // Baton tip sparkle
  const tipX = chromaX + 14 + Math.cos(batonWave - 0.3) * 22;
  const tipY = chromaY - 2 - Math.sin(batonWave - 0.3) * 22;
  const sparkle = Math.sin(os.glowPulse * 3) > 0.5;
  if (sparkle) {
    ctx.fillStyle = '#f0d040';
    ctx.fillRect(tipX - 1, tipY - 3, 2, 2);
    ctx.fillRect(tipX + 2, tipY, 2, 2);
    ctx.fillRect(tipX - 3, tipY, 2, 2);
    ctx.fillRect(tipX - 1, tipY + 2, 2, 2);
  }

  // Draw the 4 strings
  const stringStartX = 90;
  const stringEndX = W - 30;
  const stringSpacing = 30;
  const stringBaseY = 210;

  for (let i = 0; i < 4; i++) {
    const sc = STRING_COLORS[i];
    const y = stringBaseY + i * stringSpacing;
    const isActive = os.activeString === i && os.phase === 'playing';
    const isPlucked = os.pluckedString === i && os.pluckTimer > 0;
    const isWrong = os.wrongString === i && os.wrongTimer > 0;

    // Glow behind active string
    if (isActive) {
      const pulse = Math.sin(os.glowPulse) * 0.3 + 0.7;
      ctx.fillStyle = sc.glow + Math.floor(pulse * 40).toString(16).padStart(2, '0');
      ctx.fillRect(stringStartX - 5, y - 8, stringEndX - stringStartX + 10, 16);
    }

    // Wrong flash
    if (isWrong) {
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(stringStartX - 5, y - 8, stringEndX - stringStartX + 10, 16);
    }

    // The string itself — with vibration if just plucked
    const lineWidth = isActive ? 4 : 2;
    ctx.strokeStyle = isActive ? sc.glow : sc.color;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    ctx.moveTo(stringStartX, y);

    if (isPlucked) {
      // Vibrating string animation
      const decay = os.pluckTimer / 20;
      const amp = decay * 6;
      const freq = 0.08;
      for (let x = stringStartX; x <= stringEndX; x += 2) {
        const t = (x - stringStartX) / (stringEndX - stringStartX);
        const vibration = Math.sin(t * Math.PI) * Math.sin((x + os.phaseTimer * 8) * freq) * amp;
        ctx.lineTo(x, y + vibration);
      }
    } else {
      ctx.lineTo(stringEndX, y);
    }
    ctx.stroke();

    // String endpoints (pegs)
    ctx.fillStyle = '#c0a060';
    ctx.fillRect(stringStartX - 6, y - 4, 8, 8);
    ctx.fillRect(stringEndX - 2, y - 4, 8, 8);

    // Label on the left
    drawText(sc.name, stringStartX - 30, y - 3, 1, isActive ? sc.glow : sc.color + '80', 'center');

    // Key hint on the right
    drawText('' + (i + 1), stringEndX + 16, y - 3, 1, isActive ? '#ffffff' : COLORS.darkGray, 'center');
  }

  // HUD
  drawText('CHROMAS ORCHESTRA', W/2, 5, 2, COLORS.yellow, 'center');

  // Progress dots
  for (let i = 0; i < os.total; i++) {
    const dotX = W/2 - (os.total * 6) + i * 12;
    ctx.fillStyle = i < os.current ? COLORS.green : COLORS.darkGray;
    ctx.fillRect(dotX, 26, 8, 8);
  }

  if (os.phase === 'intro') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 170, 65, 340, 100);
    drawText('CHROMAS COLOR STRINGS', W/2, 72, 2, COLORS.yellow, 'center');
    drawText('A STRING WILL GLOW BRIGHT.', W/2, 98, 1, COLORS.white, 'center');
    drawText('CLICK IT OR PRESS ITS NUMBER', W/2, 114, 1, COLORS.white, 'center');
    drawText('(1, 2, 3, OR 4) TO PLUCK IT!', W/2, 130, 1, COLORS.white, 'center');
    drawText('EACH PLUCK PAINTS THE SUNRISE.', W/2, 150, 1, COLORS.lightGray, 'center');

    if (os.phaseTimer > 250) {
      os.phase = 'playing';
      os.phaseTimer = 0;
      os.activeString = os.sequence[0];
    }
  } else if (os.phase === 'playing') {
    // Instructions reminder during gameplay
    drawText('PLUCK THE GLOWING STRING! (CLICK OR PRESS 1-4)', W/2, 188, 1, COLORS.white, 'center');
  } else if (os.phase === 'done') {
    os.doneTimer++;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 70, W, 80);
    if (os.score >= 8) {
      drawText('BEAUTIFUL SUNRISE!', W/2, 85, 3, COLORS.yellow, 'center');
    } else if (os.score >= 5) {
      drawText('A COLORFUL DAWN!', W/2, 85, 3, COLORS.orange, 'center');
    } else {
      drawText('THE COLORS WENT HAYWIRE!', W/2, 88, 2, COLORS.red, 'center');
    }
    drawText(os.score + ' OF ' + os.total + ' PERFECT PLUCKS!', W/2, 128, 1, COLORS.white, 'center');

    if (os.doneTimer > 150 && !transitionTarget) {
      transitionTo('driving4');
      driveTimer = 0;
      drivePhase = 0;
      carX = -40;
      signX = W + 100;
    }
  }

  // Update sun progress
  const targetProgress = os.score / os.total;
  os.sunProgress += (targetProgress - os.sunProgress) * 0.03;
}

function pluckString(idx) {
  const os = orchestraState;
  if (os.phase !== 'playing') return;

  const sc = STRING_COLORS[idx];

  if (idx === os.activeString) {
    // Correct!
    os.score++;
    os.pluckedString = idx;
    os.pluckTimer = 20;
    playTone(sc.tone, 0.4, 'sine', 0.15);
    // Also play a harmonic
    setTimeout(() => playTone(sc.tone * 2, 0.2, 'sine', 0.05), 50);

    // Add a sky stripe
    const stripeY = 10 + (os.current / os.total) * 140;
    os.skyStripes.push({
      y: stripeY,
      h: 18,
      color: sc.color,
    });

    os.current++;
    if (os.current >= os.total) {
      os.phase = 'done';
      os.activeString = -1;
      os.doneTimer = 0;
      os.phaseTimer = 0;
      sfxConfirm();
    } else {
      os.activeString = os.sequence[os.current];
    }
  } else {
    // Wrong string — thud, flash red, but no penalty to progress
    os.wrongString = idx;
    os.wrongTimer = 15;
    os.pluckedString = idx;
    os.pluckTimer = 10;
    playTone(80, 0.15, 'triangle', 0.08);
  }
}

// Orchestra input handlers
window.addEventListener('keydown', (e) => {
  if (gameState !== 'orchestra') return;
  if (e.key === '1') pluckString(0);
  else if (e.key === '2') pluckString(1);
  else if (e.key === '3') pluckString(2);
  else if (e.key === '4') pluckString(3);
});

canvas.addEventListener('click', (e) => {
  if (gameState !== 'orchestra') return;
  const rect = canvas.getBoundingClientRect();
  const my = (e.clientY - rect.top) / (rect.height / H);
  const stringBaseY = 210;
  const stringSpacing = 30;
  for (let i = 0; i < 4; i++) {
    const y = stringBaseY + i * stringSpacing;
    if (my >= y - 12 && my < y + 12) {
      pluckString(i);
      return;
    }
  }
});

// LEVEL 2: DIGGING FOR GEMS
// ============================================================
let digState = {};

function generateDigProblem(round) {
  let a, b, op, answer;
  if (round < 2) {
    a = Math.floor(Math.random() * 10) + 1;
    b = Math.floor(Math.random() * 10) + 1;
    op = '+';
    answer = a + b;
  } else if (round < 4) {
    if (Math.random() < 0.5) {
      a = Math.floor(Math.random() * 15) + 5;
      b = Math.floor(Math.random() * 10) + 1;
      op = '+';
      answer = a + b;
    } else {
      a = Math.floor(Math.random() * 15) + 10;
      b = Math.floor(Math.random() * (a - 1)) + 1;
      op = '-';
      answer = a - b;
    }
  } else {
    if (Math.random() < 0.5) {
      a = Math.floor(Math.random() * 30) + 10;
      b = Math.floor(Math.random() * 20) + 5;
      op = '+';
      answer = a + b;
    } else {
      a = Math.floor(Math.random() * 40) + 20;
      b = Math.floor(Math.random() * 20) + 1;
      op = '-';
      answer = a - b;
    }
  }
  return { a, b, op, answer, text: a + ' ' + op + ' ' + b };
}

const GEM_NAMES = ['RUBY', 'EMERALD', 'SAPPHIRE', 'DIAMOND', 'AMETHYST', 'TOPAZ', 'OPAL', 'GARNET'];
const GEM_COLORS = {
  'RUBY': '#e02020', 'EMERALD': '#20c040', 'SAPPHIRE': '#2060e0', 'DIAMOND': '#c0e0ff',
  'AMETHYST': '#a040e0', 'TOPAZ': '#e0a020', 'OPAL': '#e0d0f0', 'GARNET': '#a02040',
};

function spawnDigRocks(problem) {
  const rocks = [];
  const answer = problem.answer;

  // Generate 2 wrong answers
  const wrongs = new Set();
  while (wrongs.size < 2) {
    let w = answer + (Math.floor(Math.random() * 7) - 3);
    if (w !== answer && w >= 0) wrongs.add(w);
  }
  const allAnswers = [answer, ...wrongs];
  // Shuffle
  for (let i = allAnswers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allAnswers[i], allAnswers[j]] = [allAnswers[j], allAnswers[i]];
  }

  // Place 3 rocks spread across the cave
  for (let i = 0; i < 3; i++) {
    rocks.push({
      x: 100 + i * 140,
      y: 210,
      w: 60,
      h: 50,
      number: allAnswers[i],
      isCorrect: allAnswers[i] === answer,
      smashed: false,
      shakeTimer: 0, // shake when wrong
      crackLevel: 0, // visual cracks when smashed
    });
  }
  return rocks;
}

function startNumberMine() {
  const problem = generateDigProblem(0);
  digState = {
    round: 0,
    total: 5,
    score: 0,
    problem: problem,
    rocks: spawnDigRocks(problem),
    playerX: 50,
    playerTargetX: 50,
    phase: 'intro',       // intro, playing, smashing, feedback, done
    phaseTimer: 0,
    gems: [],             // collected gem names
    sparkles: [],
    feedbackText: '',
    feedbackColor: '',
    caveScroll: 0,
    pickSwing: 0,         // pickaxe swing animation
    swinging: false,
  };
}

function renderNumberMine() {
  const ds = digState;
  ds.phaseTimer++;
  ds.caveScroll += 0.3;

  // Cave background
  ctx.fillStyle = '#1a1210';
  ctx.fillRect(0, 0, W, H);

  // Cave walls
  ctx.fillStyle = '#3a2a1a';
  for (let y = 0; y < H; y += 10) {
    const wl = 18 + Math.sin((y + ds.caveScroll) * 0.08) * 8;
    const wr = 18 + Math.sin((y + ds.caveScroll) * 0.1 + 2) * 8;
    ctx.fillRect(0, y, wl, 10);
    ctx.fillRect(W - wr, y, wr, 10);
  }

  // Ceiling stalactites
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(0, 0, W, 28);
  for (let x = 15; x < W - 15; x += 25) {
    const h = 8 + Math.sin(x * 0.15) * 6;
    ctx.fillRect(x, 22, 5, h);
  }

  // Cave floor
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(0, 260, W, 60);
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(0, 260, W, 4);
  // Floor rocks
  ctx.fillStyle = '#3a2a1a';
  for (let x = 20; x < W; x += 30) {
    ctx.fillRect(x, 264, 15, 5);
  }

  // Gem sparkles in walls
  const gemWallColors = ['#e04040', '#40e040', '#4080e0', '#e0e040', '#e040e0'];
  for (let i = 0; i < 6; i++) {
    const gx = (i * 97 + 10) % (W - 40) + 20;
    const gy = (i * 53 + 40) % 200 + 40;
    const sparkle = Math.sin(frameCount * 0.05 + i * 2) * 0.3 + 0.7;
    ctx.fillStyle = gemWallColors[i % gemWallColors.length] + Math.floor(sparkle * 50).toString(16).padStart(2, '0');
    ctx.fillRect(gx, gy, 4, 4);
  }

  // Sparkle effects
  for (let i = ds.sparkles.length - 1; i >= 0; i--) {
    const sp = ds.sparkles[i];
    sp.life--;
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.vy += 0.1;
    ctx.fillStyle = sp.color;
    ctx.globalAlpha = sp.life / sp.maxLife;
    ctx.fillRect(sp.x - 2, sp.y - 2, 4, 4);
    ctx.globalAlpha = 1;
    if (sp.life <= 0) ds.sparkles.splice(i, 1);
  }

  // HUD
  drawText('THE NUMBER MINE', W/2, 5, 2, COLORS.yellow, 'center');
  drawText('ROUND ' + Math.min(ds.round + 1, ds.total) + '/' + ds.total, W - 20, 8, 1, COLORS.lightGray, 'right');

  // Collected gems
  if (ds.gems.length > 0) {
    for (let i = 0; i < ds.gems.length; i++) {
      const gname = ds.gems[i];
      const gc = GEM_COLORS[gname] || '#e0e0e0';
      ctx.fillStyle = gc;
      const gx = 12 + i * 18;
      ctx.beginPath();
      ctx.moveTo(gx, 22);
      ctx.lineTo(gx + 5, 28);
      ctx.lineTo(gx, 34);
      ctx.lineTo(gx - 5, 28);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffffff40';
      ctx.fillRect(gx - 2, 24, 2, 2);
    }
  }

  // Draw rocks (boulders blocking the path)
  for (const rock of ds.rocks) {
    if (rock.smashed) continue;

    const shakeX = rock.shakeTimer > 0 ? (Math.random() - 0.5) * rock.shakeTimer : 0;
    rock.shakeTimer = Math.max(0, rock.shakeTimer - 0.5);

    const rx = rock.x + shakeX;
    const ry = rock.y;

    // Boulder shape
    ctx.fillStyle = '#6a5a4a';
    ctx.fillRect(rx, ry, rock.w, rock.h);
    ctx.fillStyle = '#7a6a5a';
    ctx.fillRect(rx + 3, ry + 3, rock.w - 6, rock.h - 6);
    // Rock texture
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(rx + 10, ry + 8, 15, 3);
    ctx.fillRect(rx + 5, ry + 20, 20, 2);
    ctx.fillRect(rx + 25, ry + 15, 18, 3);
    ctx.fillRect(rx + 8, ry + 35, 12, 2);

    // Cracks (if tried wrong)
    if (rock.crackLevel > 0) {
      ctx.strokeStyle = '#3a2a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rx + rock.w/2, ry + 5);
      ctx.lineTo(rx + rock.w/2 + 8, ry + rock.h/2);
      ctx.lineTo(rx + rock.w/2 - 5, ry + rock.h - 5);
      ctx.stroke();
    }

    // Number on rock
    drawText('' + rock.number, rx + rock.w/2, ry + rock.h/2 - 7, 3, '#e0d8c0', 'center');

    // Gem peeking out from behind correct rock
    if (rock.isCorrect) {
      const gemPeek = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
      const gemName = GEM_NAMES[ds.round % GEM_NAMES.length];
      const gc = GEM_COLORS[gemName];
      ctx.fillStyle = gc + Math.floor(gemPeek * 60).toString(16).padStart(2, '0');
      ctx.fillRect(rx + rock.w - 5, ry + rock.h - 12, 8, 8);
    }
  }

  // Player character
  ds.playerX += (ds.playerTargetX - ds.playerX) * 0.15;
  const key = characterKeys[selectedCharacter];
  const playerScreenX = ds.playerX - 24;
  const playerScreenY = 210;
  drawPixelArt(SPRITES[key].data, playerScreenX, playerScreenY, 3);

  // Pickaxe (swings when smashing)
  if (ds.swinging) {
    ds.pickSwing += 0.15;
    if (ds.pickSwing > Math.PI) {
      ds.swinging = false;
      ds.pickSwing = 0;
    }
  }
  const pickAngle = ds.swinging ? Math.sin(ds.pickSwing) * 1.2 : 0.3;
  const pickBaseX = ds.playerX + 20;
  const pickBaseY = playerScreenY + 15;
  // Handle
  ctx.fillStyle = '#8a6a40';
  for (let i = 0; i < 18; i++) {
    const px = pickBaseX + Math.cos(pickAngle) * i;
    const py = pickBaseY - Math.sin(pickAngle) * i;
    ctx.fillRect(px, py, 2, 2);
  }
  // Head
  const headX = pickBaseX + Math.cos(pickAngle) * 18;
  const headY = pickBaseY - Math.sin(pickAngle) * 18;
  ctx.fillStyle = '#808080';
  ctx.fillRect(headX - 5, headY - 2, 12, 5);

  // Math problem display
  if (ds.phase === 'playing' || ds.phase === 'choosing') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W/2 - 130, 40, 260, 38);
    drawText('SMASH: ' + ds.problem.text + ' = ?', W/2, 50, 2, COLORS.yellow, 'center');
    drawText('CLICK THE ROCK WITH THE RIGHT ANSWER!', W/2, 70, 1, COLORS.lightGray, 'center');
  }

  if (ds.phase === 'intro') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W/2 - 180, 55, 360, 120);
    drawText('THE NUMBER MINE!', W/2, 65, 2, COLORS.yellow, 'center');
    drawText('ROCKS BLOCK YOUR PATH.', W/2, 92, 1, COLORS.white, 'center');
    drawText('EACH ROCK HAS A NUMBER.', W/2, 108, 1, COLORS.white, 'center');
    drawText('SMASH THE ROCK THAT SOLVES', W/2, 124, 1, COLORS.white, 'center');
    drawText('THE MATH PROBLEM!', W/2, 140, 1, COLORS.white, 'center');
    drawText('CLICK A ROCK OR PRESS 1, 2, 3', W/2, 162, 1, COLORS.lightGray, 'center');

    if (ds.phaseTimer > 250) {
      ds.phase = 'playing';
      ds.phaseTimer = 0;
      ds.playerTargetX = 50;
    }
  } else if (ds.phase === 'playing') {
    // Waiting for player to click a rock
  } else if (ds.phase === 'feedback') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 130, 90, 260, 40);
    drawText(ds.feedbackText, W/2, 100, 2, ds.feedbackColor, 'center');

    if (ds.phaseTimer > 70) {
      ds.round++;
      if (ds.round >= ds.total) {
        ds.phase = 'done';
        ds.phaseTimer = 0;
      } else {
        ds.problem = generateDigProblem(ds.round);
        ds.rocks = spawnDigRocks(ds.problem);
        ds.phase = 'playing';
        ds.phaseTimer = 0;
        ds.playerTargetX = 50;
      }
    }
  } else if (ds.phase === 'done') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 70, W, 100);
    drawText('MINE COMPLETE!', W/2, 85, 3, COLORS.yellow, 'center');
    drawText('YOU FOUND ' + ds.score + ' OUT OF ' + ds.total + ' GEMS!', W/2, 120, 1, COLORS.white, 'center');
    const msg = ds.score >= 4 ? 'MASTER MATHEMATICIAN!' : ds.score >= 3 ? 'GOOD DIGGING!' : 'KEEP PRACTICING!';
    drawText(msg, W/2, 140, 1, COLORS.green, 'center');

    // Show all collected gems with names
    if (ds.gems.length > 0) {
      const gemsW = ds.gems.length * 60;
      const startX = W/2 - gemsW/2;
      for (let i = 0; i < ds.gems.length; i++) {
        const gname = ds.gems[i];
        const gc = GEM_COLORS[gname];
        const gx = startX + i * 60 + 25;
        ctx.fillStyle = gc;
        ctx.beginPath();
        ctx.moveTo(gx, 152);
        ctx.lineTo(gx + 8, 162);
        ctx.lineTo(gx, 172);
        ctx.lineTo(gx - 8, 162);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffffff40';
        ctx.fillRect(gx - 2, 155, 3, 3);
        drawText(gname, gx, 178, 1, gc, 'center');
      }
    }

    if (Math.floor(frameCount / 30) % 2 === 0) {
      drawText('CLICK TO CONTINUE', W/2, 260, 1, COLORS.cyan, 'center');
    }
  }
}

function digSmashRock(rockIdx) {
  const ds = digState;
  if (ds.phase !== 'playing' || rockIdx < 0 || rockIdx >= ds.rocks.length) return;
  const rock = ds.rocks[rockIdx];
  if (rock.smashed) return;

  // Move player toward rock
  ds.playerTargetX = rock.x - 10;
  ds.swinging = true;
  ds.pickSwing = 0;

  if (rock.isCorrect) {
    // Correct! Smash it
    rock.smashed = true;
    ds.score++;
    ds.feedbackText = 'CORRECT!';
    ds.feedbackColor = COLORS.green;
    sfxConfirm();

    // Award gem
    const gemName = GEM_NAMES[ds.round % GEM_NAMES.length];
    ds.gems.push(gemName);

    // Smash sparkles
    const gc = GEM_COLORS[gemName];
    for (let i = 0; i < 10; i++) {
      ds.sparkles.push({
        x: rock.x + rock.w/2,
        y: rock.y + rock.h/2,
        vx: (Math.random() - 0.5) * 5,
        vy: -Math.random() * 4 - 1,
        color: i < 5 ? gc : '#8a7a6a',
        life: 25 + Math.random() * 20,
        maxLife: 45,
      });
    }

    ds.phase = 'feedback';
    ds.phaseTimer = 0;
  } else {
    // Wrong! Rock shakes but doesn't break
    rock.shakeTimer = 15;
    rock.crackLevel++;
    ds.feedbackText = 'WRONG! ANSWER: ' + ds.problem.answer;
    ds.feedbackColor = COLORS.red;
    playTone(80, 0.2, 'sawtooth', 0.08);

    ds.phase = 'feedback';
    ds.phaseTimer = 0;
  }
}

// Digging input handlers
window.addEventListener('keydown', (e) => {
  if (gameState === 'numbermine' && digState.phase === 'playing') {
    if (e.key === '1') digSmashRock(0);
    else if (e.key === '2') digSmashRock(1);
    else if (e.key === '3') digSmashRock(2);
  }
  if (gameState === 'numbermine' && digState.phase === 'done') {
    if (e.key === 'Enter' || e.key === ' ') {
      sfxConfirm();
      transitionTo('driving5');
      driveTimer = 0;
      drivePhase = 0;
      carX = -40;
    }
  }
});

canvas.addEventListener('click', (e) => {
  if (gameState !== 'numbermine') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / (rect.width / W);
  const my = (e.clientY - rect.top) / (rect.height / H);

  if (digState.phase === 'done') {
    sfxConfirm();
    transitionTo('driving5');
    driveTimer = 0;
    drivePhase = 0;
    carX = -40;
    return;
  }

  if (digState.phase !== 'playing') return;

  // Click on rocks
  for (let i = 0; i < digState.rocks.length; i++) {
    const rock = digState.rocks[i];
    if (rock.smashed) continue;
    if (mx > rock.x && mx < rock.x + rock.w && my > rock.y && my < rock.y + rock.h) {
      digSmashRock(i);
      return;
    }
  }
});

  for (let x = 0; x < W; x++) {

  }

// ============================================================
// LEVEL 3: DEMON DODGE STAIRCASE
// ============================================================
let staircaseState = {};

function startStaircase() {
  // Build the staircase — a series of platforms going up
  const platforms = [];
  const totalHeight = 2200; // total climb distance (shorter level)
  const platCount = 30;

  // Ground platform at the very bottom (full width)
  platforms.push({
    x: 0,
    y: totalHeight + 20,
    w: W,
    isGround: true,
  });

  for (let i = 0; i < platCount; i++) {
    const y = totalHeight - i * (totalHeight / platCount);
    const x = 60 + Math.sin(i * 0.7) * 120 + Math.random() * 80;
    platforms.push({
      x: x,
      y: y,
      w: 60 + Math.random() * 30,
    });
  }

  // Add a landing platform near the top and the castle above it
  platforms.push({
    x: W / 2 - 45,
    y: 30,
    w: 90,
  });
  // Castle in the Air (win trigger)
  platforms.push({
    x: W / 2 - 60,
    y: -60,
    w: 120,
    isCastle: true,
  });

  // Spawn demons at various heights
  const demons = [];
  const demonTypes = [
    { name: 'TRIVIUM', color: '#a04040', speed: 1.2, w: 20, h: 24 },
    { name: 'GIANT', color: '#40a060', speed: 0.6, w: 28, h: 32 },
    { name: 'SENSES', color: '#8040a0', speed: 1.8, w: 16, h: 20 },
  ];

  for (let i = 0; i < 9; i++) {
    const dtype = demonTypes[i % demonTypes.length];
    const demonY = totalHeight - 200 - i * (totalHeight / 11);
    demons.push({
      x: 40 + Math.random() * (W - 80),
      y: demonY,
      baseX: 40 + Math.random() * (W - 80),
      type: dtype,
      dir: Math.random() < 0.5 ? 1 : -1,
      phase: Math.random() * Math.PI * 2,
      amplitude: 60 + Math.random() * 80,
    });
  }

  staircaseState = {
    platforms: platforms,
    demons: demons,
    playerX: W / 2,
    playerY: totalHeight + 20,
    playerVX: 0,
    playerVY: 0,
    onGround: false,
    cameraY: totalHeight - H + 100,
    totalHeight: totalHeight,
    phase: 'intro',      // intro, playing, won
    phaseTimer: 0,
    lives: 3,
    hitTimer: 0,         // invincibility frames after hit
    done: false,
    doneTimer: 0,
    jumpHeld: false,
  };
}

function renderStaircase() {
  const st = staircaseState;
  st.phaseTimer++;

  // Dark ominous sky with gradient
  const heightProgress = 1 - (st.cameraY / st.totalHeight);
  const skyR = Math.floor(15 + heightProgress * 25);
  const skyG = Math.floor(10 + heightProgress * 15);
  const skyB = Math.floor(30 + heightProgress * 50);
  ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
  ctx.fillRect(0, 0, W, H);

  // Stars (more visible higher up)
  for (let i = 0; i < 30; i++) {
    const sx = (i * 73 + 20) % W;
    const sy = ((i * 47 + st.cameraY * 0.1) % H + H) % H;
    const alpha = 0.2 + heightProgress * 0.5 + Math.sin(frameCount * 0.02 + i) * 0.15;
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Castle in the Air at the very top (visible when close)
  if (st.cameraY < 250) {
    const castleScreenY = -60 - st.cameraY;
    // Castle floating
    const castleBob = Math.sin(frameCount * 0.02) * 5;
    const cy = castleScreenY + castleBob;

    // Cloud base
    ctx.fillStyle = '#ffffff30';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(W/2 - 30 + i * 15, cy + 50, 20, 0, Math.PI * 2);
      ctx.fill();
    }

    // Castle body
    ctx.fillStyle = '#d0c0a0';
    ctx.fillRect(W/2 - 35, cy - 20, 70, 60);
    // Towers
    ctx.fillStyle = '#c0b090';
    ctx.fillRect(W/2 - 40, cy - 40, 20, 80);
    ctx.fillRect(W/2 + 20, cy - 40, 20, 80);
    // Tower tops
    ctx.fillStyle = '#a08060';
    ctx.fillRect(W/2 - 42, cy - 48, 24, 10);
    ctx.fillRect(W/2 + 18, cy - 48, 24, 10);
    // Flags
    ctx.fillStyle = '#e04040';
    ctx.fillRect(W/2 - 38, cy - 60, 12, 10);
    ctx.fillRect(W/2 + 22, cy - 60, 12, 10);
    // Door
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(W/2 - 8, cy + 20, 16, 20);
    // Windows
    ctx.fillStyle = '#f0e080';
    ctx.fillRect(W/2 - 25, cy - 5, 8, 10);
    ctx.fillRect(W/2 + 17, cy - 5, 8, 10);
    // Label
    drawText('CASTLE IN THE AIR', W/2, cy - 68, 1, COLORS.yellow, 'center');
  }

  // Draw platforms (stone stairs)
  for (const plat of st.platforms) {
    const screenY = plat.y - st.cameraY;
    if (screenY < -20 || screenY > H + 20) continue;
    if (plat.isCastle) continue; // castle drawn separately

    if (plat.isGround) {
      // Solid ground at bottom
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(0, screenY, W, H - screenY + 50);
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(0, screenY, W, 6);
      // Rocky texture
      ctx.fillStyle = '#3a2a1a';
      for (let tx = 0; tx < W; tx += 20) {
        ctx.fillRect(tx, screenY + 6, 12, 3);
      }
      continue;
    }

    // Stone platform
    ctx.fillStyle = '#5a5050';
    ctx.fillRect(plat.x, screenY, plat.w, 10);
    ctx.fillStyle = '#6a6060';
    ctx.fillRect(plat.x, screenY, plat.w, 4);
    // Stone texture
    ctx.fillStyle = '#4a4040';
    for (let tx = plat.x + 5; tx < plat.x + plat.w - 5; tx += 15) {
      ctx.fillRect(tx, screenY + 4, 8, 1);
    }
  }

  // Draw demons
  for (const demon of st.demons) {
    const screenY = demon.y - st.cameraY;
    if (screenY < -40 || screenY > H + 40) continue;

    // Move demon side to side
    demon.phase += 0.02;
    demon.x = demon.baseX + Math.sin(demon.phase) * demon.amplitude;
    demon.x = Math.max(10, Math.min(W - demon.type.w - 10, demon.x));

    const dt = demon.type;
    const dx = demon.x;
    const dy = screenY;

    // Demon body
    ctx.fillStyle = dt.color;
    ctx.fillRect(dx, dy - dt.h, dt.w, dt.h);

    // Evil eyes
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(dx + 4, dy - dt.h + 5, 3, 3);
    ctx.fillRect(dx + dt.w - 7, dy - dt.h + 5, 3, 3);

    // Mouth
    ctx.fillStyle = '#200000';
    ctx.fillRect(dx + 5, dy - dt.h + 12, dt.w - 10, 3);

    // Horns/spikes on top
    ctx.fillStyle = dt.color;
    ctx.fillRect(dx + 2, dy - dt.h - 5, 4, 6);
    ctx.fillRect(dx + dt.w - 6, dy - dt.h - 5, 4, 6);
  }

  // Player character
  if (st.phase === 'playing' || st.phase === 'won') {
    const playerScreenY = st.playerY - st.cameraY;

    // Flash when hit (invincibility)
    if (st.hitTimer <= 0 || Math.floor(st.hitTimer / 3) % 2 === 0) {
      const key = characterKeys[selectedCharacter];
      drawPixelArt(SPRITES[key].data, st.playerX - 24, playerScreenY - 48, 3);
    }
  }

  // HUD
  drawText('CASTLE IN THE AIR', W/2, 5, 2, COLORS.yellow, 'center');

  // Lives
  for (let i = 0; i < st.lives; i++) {
    ctx.fillStyle = COLORS.red;
    ctx.fillRect(10 + i * 16, 8, 10, 10);
    ctx.fillStyle = '#ff6060';
    ctx.fillRect(11 + i * 16, 9, 4, 4);
  }

  // Height progress bar
  const progress = 1 - (st.playerY / st.totalHeight);
  ctx.fillStyle = '#303030';
  ctx.fillRect(W - 16, 30, 8, H - 40);
  ctx.fillStyle = COLORS.green;
  ctx.fillRect(W - 16, 30 + (H - 40) * (1 - progress), 8, (H - 40) * progress);
  drawText('TOP', W - 12, 22, 1, COLORS.lightGray, 'center');

  if (st.phase === 'intro') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W/2 - 180, 70, 360, 130);
    drawText('DEMON DODGE STAIRCASE', W/2, 80, 2, COLORS.red, 'center');
    drawText('CLIMB THE STAIRS TO THE', W/2, 110, 1, COLORS.white, 'center');
    drawText('CASTLE IN THE AIR!', W/2, 126, 1, COLORS.white, 'center');
    if (isMobile) {
      drawText('USE THE BUTTONS TO MOVE', W/2, 150, 1, COLORS.lightGray, 'center');
      drawText('AND JUMP!', W/2, 166, 1, COLORS.lightGray, 'center');
    } else {
      drawText('ARROW KEYS OR A/D TO MOVE', W/2, 150, 1, COLORS.lightGray, 'center');
      drawText('SPACE OR W TO JUMP', W/2, 166, 1, COLORS.lightGray, 'center');
    }
    drawText('AVOID THE DEMONS!', W/2, 186, 1, COLORS.red, 'center');

    if (st.phaseTimer > 280) {
      st.phase = 'playing';
      st.phaseTimer = 0;
    }
  } else if (st.phase === 'playing') {
    // Player physics
    // Horizontal movement
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      st.playerVX = -3.5;
    } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      st.playerVX = 3.5;
    } else {
      st.playerVX *= 0.8;
    }

    // Jump
    if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && st.onGround && !st.jumpHeld) {
      st.playerVY = -9;
      st.onGround = false;
      st.jumpHeld = true;
      playTone(300, 0.05, 'square', 0.06);
    }
    if (!keys[' '] && !keys['ArrowUp'] && !keys['w'] && !keys['W']) {
      st.jumpHeld = false;
    }

    // Gravity
    st.playerVY += 0.45;
    if (st.playerVY > 10) st.playerVY = 10;

    // Move
    st.playerX += st.playerVX;
    st.playerY += st.playerVY;

    // Screen bounds
    if (st.playerX < 10) st.playerX = 10;
    if (st.playerX > W - 10) st.playerX = W - 10;

    // Platform collision
    st.onGround = false;
    for (const plat of st.platforms) {
      if (plat.isCastle) {
        // Win condition — just need to get high enough and be roughly near the castle
        if (st.playerY < plat.y + 60 && st.playerX > plat.x - 30 && st.playerX < plat.x + plat.w + 30) {
          st.phase = 'won';
          st.phaseTimer = 0;
          st.done = true;
          st.doneTimer = 0;
          sfxConfirm();
        }
        continue;
      }
      // Check if landing on platform (falling down onto it)
      if (st.playerVY >= 0 &&
          st.playerX > plat.x - 10 && st.playerX < plat.x + plat.w + 10 &&
          st.playerY >= plat.y - 2 && st.playerY <= plat.y + 12) {
        st.playerY = plat.y;
        st.playerVY = 0;
        st.onGround = true;
      }
    }

    // Floor at the bottom
    if (st.playerY > st.totalHeight + 20) {
      st.playerY = st.totalHeight + 20;
      st.playerVY = 0;
      st.onGround = true;
    }

    // Demon collision
    if (st.hitTimer > 0) {
      st.hitTimer--;
    } else {
      for (const demon of st.demons) {
        const dt = demon.type;
        const dx = demon.x;
        const dy = demon.y;
        // Simple box collision
        if (st.playerX > dx - 15 && st.playerX < dx + dt.w + 15 &&
            st.playerY > dy - dt.h - 20 && st.playerY < dy + 5) {
          st.lives--;
          st.hitTimer = 60; // invincibility frames
          st.playerVY = -6; // bounce away
          playTone(120, 0.2, 'square', 0.1);

          if (st.lives <= 0) {
            // Restart from the bottom
            st.lives = 3;
            st.playerX = W / 2;
            st.playerY = st.totalHeight + 20;
            st.playerVX = 0;
            st.playerVY = 0;
            st.cameraY = st.totalHeight - H + 100;
            st.hitTimer = 90;
            playTone(80, 0.4, 'sawtooth', 0.1);
          }
          break;
        }
      }
    }

    // Camera follows player (smooth)
    const targetCameraY = st.playerY - H * 0.6;
    st.cameraY += (targetCameraY - st.cameraY) * 0.1;

    // Mobile touch controls
    drawVirtualButtons();

  } else if (st.phase === 'won') {
    st.doneTimer++;

    // Gentle float up to the castle
    st.playerY -= 0.5;
    const targetCameraY = st.playerY - H * 0.5;
    st.cameraY += (targetCameraY - st.cameraY) * 0.05;

    if (st.doneTimer > 60) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 80, W, 90);
      drawText('YOU RESCUED', W/2, 95, 3, COLORS.yellow, 'center');
      drawText('RHYME AND REASON!', W/2, 125, 3, COLORS.gold, 'center');
      drawText('THE KINGDOM OF WISDOM IS SAVED!', W/2, 155, 1, COLORS.white, 'center');
    }

    if (st.doneTimer > 250 && !transitionTarget) {
      transitionTo('victory');
    }
  }
}

// VICTORY / END SCREEN

let victoryState = {};

function startVictory() {
  victoryState = {
    timer: 0,
    fireworks: [],
    characters: [
      { name: 'RHYME', x: W/2 - 60, y: 160, color: '#e0a0d0' },
      { name: 'REASON', x: W/2 + 60, y: 160, color: '#a0d0e0' },
    ],
  };
}

function renderVictory() {
  const vs = victoryState;
  vs.timer++;

  // Background — golden/warm celebration sky
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, '#1a1040');
  gradient.addColorStop(0.5, '#3a2060');
  gradient.addColorStop(1, '#2a1848');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 73 + 20) % W;
    const sy = (i * 47 + 10) % (H - 50);
    const twinkle = Math.sin(frameCount * 0.03 + i * 1.5) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,200,${twinkle * 0.6})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Fireworks
  if (vs.timer > 30 && vs.timer % 25 === 0 && vs.fireworks.length < 20) {
    const fx = 40 + Math.random() * (W - 80);
    const fy = 30 + Math.random() * 120;
    const fc = ['#e04040', '#40e040', '#4080e0', '#e0e040', '#e040e0', '#40e0e0', '#e08020'][Math.floor(Math.random() * 7)];
    for (let p = 0; p < 12; p++) {
      const angle = (p / 12) * Math.PI * 2;
      vs.fireworks.push({
        x: fx, y: fy,
        vx: Math.cos(angle) * (1.5 + Math.random()),
        vy: Math.sin(angle) * (1.5 + Math.random()),
        color: fc,
        life: 40 + Math.random() * 20,
        maxLife: 60,
      });
    }
    playTone(400 + Math.random() * 400, 0.1, 'sine', 0.06);
  }

  for (let i = vs.fireworks.length - 1; i >= 0; i--) {
    const fw = vs.fireworks[i];
    fw.x += fw.vx;
    fw.y += fw.vy;
    fw.vy += 0.03;
    fw.life--;
    const alpha = fw.life / fw.maxLife;
    ctx.fillStyle = fw.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(fw.x - 2, fw.y - 2, 4, 4);
    ctx.globalAlpha = 1;
    if (fw.life <= 0) vs.fireworks.splice(i, 1);
  }

  // Title
  if (vs.timer > 10) {
    const pulse = Math.sin(vs.timer * 0.04) * 0.15 + 0.85;
    drawText('THE END', W/2, 30, 3, COLORS.yellow, 'center');
  }

  // Princesses Rhyme and Reason
  if (vs.timer > 60) {
    for (const ch of vs.characters) {
      const bob = Math.sin(frameCount * 0.03 + (ch.name === 'RHYME' ? 0 : Math.PI)) * 3;
      // Crown
      ctx.fillStyle = '#f0d040';
      ctx.fillRect(ch.x - 6, ch.y - 34 + bob, 12, 4);
      ctx.fillRect(ch.x - 8, ch.y - 38 + bob, 3, 5);
      ctx.fillRect(ch.x - 1, ch.y - 40 + bob, 3, 7);
      ctx.fillRect(ch.x + 5, ch.y - 38 + bob, 3, 5);
      // Head
      ctx.fillStyle = '#f0b888';
      ctx.fillRect(ch.x - 6, ch.y - 30 + bob, 12, 12);
      // Eyes
      ctx.fillStyle = '#302020';
      ctx.fillRect(ch.x - 4, ch.y - 26 + bob, 2, 2);
      ctx.fillRect(ch.x + 2, ch.y - 26 + bob, 2, 2);
      // Smile
      ctx.fillRect(ch.x - 2, ch.y - 22 + bob, 4, 1);
      // Hair
      ctx.fillStyle = ch.name === 'RHYME' ? '#8a5a30' : '#4a3020';
      ctx.fillRect(ch.x - 8, ch.y - 30 + bob, 3, 14);
      ctx.fillRect(ch.x + 5, ch.y - 30 + bob, 3, 14);
      ctx.fillRect(ch.x - 7, ch.y - 32 + bob, 14, 3);
      // Dress
      ctx.fillStyle = ch.color;
      ctx.fillRect(ch.x - 8, ch.y - 18 + bob, 16, 22);
      ctx.fillRect(ch.x - 10, ch.y - 8 + bob, 20, 14);
      // Name
      drawText(ch.name, ch.x, ch.y + 10 + bob, 1, ch.color, 'center');
    }

    // Player character between them
    const key = characterKeys[selectedCharacter];
    const playerBob = Math.sin(frameCount * 0.03 + 1) * 3;
    drawPixelArt(SPRITES[key].data, W/2 - 24, 130 + playerBob, 3);
  }

  // Story message
  if (vs.timer > 120) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(30, 210, W - 60, 95);

    drawText('RHYME AND REASON HAVE RETURNED', W/2, 218, 1, COLORS.white, 'center');
    drawText('TO THE KINGDOM OF WISDOM.', W/2, 234, 1, COLORS.white, 'center');
    drawText('THE LANDS BEYOND ARE AT PEACE', W/2, 256, 1, COLORS.lightGray, 'center');
    drawText('ONCE MORE.', W/2, 272, 1, COLORS.lightGray, 'center');
  }

  if (vs.timer > 220) {
    drawText('AND MILO LEARNED THAT THERE IS SO', W/2, 282, 1, COLORS.gold, 'center');
    drawText('MUCH TO DO RIGHT WHERE HE IS.', W/2, 296, 1, COLORS.gold, 'center');
  }

  // Credits / replay
  if (vs.timer > 350) {
    if (Math.floor(frameCount / 30) % 2 === 0) {
      drawText('CLICK TO PLAY AGAIN', W/2, 312, 1, COLORS.cyan, 'center');
    }
  }
}

// Victory input handlers
window.addEventListener('keydown', (e) => {
  if (gameState !== 'victory') return;
  if (victoryState.timer > 350 && (e.key === 'Enter' || e.key === ' ')) {
    sfxConfirm();
    transitionTo('title');
  }
});

canvas.addEventListener('click', (e) => {
  if (gameState !== 'victory') return;
  if (victoryState.timer > 350) {
    sfxConfirm();
    transitionTo('title');
  }
});

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop() {
  frameCount++;

  // Handle transitions
  if (transitionTarget) {
    transitionAlpha += 0.04;
    if (transitionAlpha >= 1) {
      gameState = transitionTarget;
      transitionTarget = null;
      // Init new state
      if (gameState === 'wordmarket') startWordMarket();
      if (gameState === 'orchestra') startOrchestra();
      if (gameState === 'numbermine') startNumberMine();
      if (gameState === 'staircase') startStaircase();
      if (gameState === 'victory') startVictory();
    }
  } else if (transitionAlpha > 0) {
    transitionAlpha -= 0.04;
  }

  // Render current state
  switch (gameState) {
    case 'title': renderTitle(); break;
    case 'summary': renderSummary(); break;
    case 'charselect': renderCharSelect(); break;
    case 'driving': renderDriving(); break;
    case 'doldrums': renderDoldrums(); break;
    case 'driving2': renderDriving2(); break;
    case 'wordmarket': renderWordMarket(); break;
    case 'driving3': renderDriving3(); break;
    case 'orchestra': renderOrchestra(); break;
    case 'driving4': renderDriving4(); break;
    case 'numbermine': renderNumberMine(); break;
    case 'driving5': renderDriving5(); break;
    case 'staircase': renderStaircase(); break;
    case 'victory': renderVictory(); break;
  }

  // Transition overlay
  if (transitionAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${Math.min(1, transitionAlpha)})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Reset click state
  clicked = false;
  clickX = -1;
  clickY = -1;

  requestAnimationFrame(gameLoop);
}

// Start!
gameLoop();
</script>
